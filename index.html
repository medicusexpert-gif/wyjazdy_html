<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: black;
    }

    iframe {
      width: 100vw;
      height: 100vh;
      border: none;
    }

    .loading {
      color: white;
      font-family: Arial, sans-serif;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 9999;
    }
  </style>
</head>

<body>

<div id="loading" class="loading">Ładowanie dokumentu...</div>

<script>
  const url = "https://1drv.ms/x/c/54e32aaae4b04f4b/IQQz7EAPk0CNTa1CSZcImkRFAfpKY2F0HY71GHezLo4iDOA?em=2&wdAllowInteractivity=False&wdHideGridlines=True&wdHideHeaders=True&wdDownloadButton=True&wdInConfigurator=True&wdInConfigurator=True&edaebf=rslc0";

  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || 
                (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);

  if (isIOS) {
    window.location.replace(url);
  } else {
    const iframe = document.createElement("iframe");
    iframe.src = url;

    iframe.onload = function () {
      document.getElementById("loading").style.display = "none";
    };

    document.body.appendChild(iframe);
  }
</script>

</body>
</html>
